<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST Calculator | Perry Kaneriya</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h1>GST Calculator</h1>
        <p class="subtitle">
            Calculate GST, CGST and SGST instantly
        </p>

        <div class="form-group">
            <label>Amount (₹)</label>
            <input
                type="number"
                id="amount"
                placeholder="Enter amount">
        </div>

        <div class="form-group">
            <label>GST Percentage (%)</label>
            <input
                type="number"
                id="gst"
                placeholder="Enter GST rate">
        </div>

        <div class="button-group">

            <button
                class="calculate-btn"
                onclick="calculateGST()">
                Calculate
            </button>

            <button
                class="reset-btn"
                onclick="resetForm()">
                Reset
            </button>

        </div>

        <div id="result" class="result-box"></div>

        <div class="developer-info">

            <h3>Developer Information</h3>

            <p>
                <strong>Name:</strong>
                Perry Kaneriya
            </p>

            <p>
                <strong>Email Id:</strong>
                <a href="mailto:perrykaneriya19@gmail.com" class="email-link">
        perrykaneriya19@gmail.com
    </a>
            </p>

        </div>

        <a
            href="https://digitalheroesco.com"
            target="_blank"
            class="digital-heroes-link">

            Built for Digital Heroes

        </a>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
